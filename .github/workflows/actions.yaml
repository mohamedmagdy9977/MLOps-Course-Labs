name: Build, Test, and Upload to Docker Hub
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
env:
  IMAGE_NAME: churn-prediction-api
  CONTAINER_PORT: "8000"
 
jobs:
  setup-and-test:
    name: Setting up the environment and testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install "pytest>=9.0.3" "pytest-cov>=7.1.0"
 
      - name: Run pytest (unit tests)
        run: |
          PYTHONPATH=. pytest tests/ -v \
            --cov=app --cov=main \
            --cov-report=term-missing
 
  build-and-verify:
    name: Building and verifying the Docker image
    runs-on: ubuntu-latest
    needs: setup-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          push: false
 
      - name: Run Docker container
        run: |
          docker run -d --name api \
            -p ${{ env.CONTAINER_PORT }}:8000 \
            ${{ env.IMAGE_NAME }}:latest
 
  push-to-dockerhub:
    name: Pushing the Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
 
  deploy-to-ec2:
    name: Connecting to EC2 instance
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Connect to EC2 instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # env vars are not available in the remote SSH shell,
          # so the image name and port are hardcoded here
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/churn-prediction-api:latest
            docker stop churn-prediction-api || true
            docker rm churn-prediction-api || true
            docker run -d -p 8000:8000 --name churn-prediction-api \
              ${{ secrets.DOCKER_USERNAME }}/churn-prediction-api:latest