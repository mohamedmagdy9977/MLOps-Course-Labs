name: Build, Test, and Upload to Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: churn-prediction-api
  CONTAINER_PORT: "8000"

jobs:
  test_build_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
          pip install "pytest>=9.0.3" "pytest-cov>=7.1.0"

      - name: Run pytest (unit tests)
        run: |
          PYTHONPATH=. pytest tests/ -v \
            --cov=app --cov=main \
            --cov-report=term-missing

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          push: false

      - name: Run Docker container
        run: |
          docker run -d --name api \
            -p ${{ env.CONTAINER_PORT }}:8000 \
            ${{ env.IMAGE_NAME }}:latest

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${CONTAINER_PORT}/health"; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API did not become ready in time"
          docker logs api
          exit 1

      - name: Smoke test running container
        run: |
          curl -sf "http://localhost:${CONTAINER_PORT}/health" | grep -q healthy
          curl -sf "http://localhost:${CONTAINER_PORT}/" | grep -q "Welcome"
          curl -sf -X POST "http://localhost:${CONTAINER_PORT}/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "CreditScore": 619,
              "Geography": "France",
              "Gender": "Female",
              "Age": 42,
              "Tenure": 2,
              "Balance": 0,
              "NumOfProducts": 1,
              "HasCrCard": 1,
              "IsActiveMember": 1,
              "EstimatedSalary": 5
            }' | grep -q prediction

      - name: Stop container
        if: always()
        run: docker rm -f api || true

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
