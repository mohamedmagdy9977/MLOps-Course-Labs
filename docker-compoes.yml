services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    command:
      [
        "litestar",
        "--app",
        "main:app",
        "run",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
